version: "3.8"

networks:
  kentsel:
    driver: bridge

volumes:
  clickhouse-data:

services:

  # ─────────────────────────────────────────────
  # ALTYAPI SERVİSLERİ
  # ─────────────────────────────────────────────

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - kentsel
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    networks:
      - kentsel
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,INTERNAL://0.0.0.0:19092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:19092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 40s

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    networks:
      - kentsel
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./clickhouse/streaming.xml:/etc/clickhouse-server/users.d/streaming.xml
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8123/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  emqx:
    image: emqx/emqx:latest
    container_name: emqx
    ports:
      - "1883:1883"
      - "8083:8083"
      - "18083:18083"
    networks:
      - kentsel
    environment:
      EMQX_ALLOW_ANONYMOUS: "true"
    healthcheck:
      test: ["CMD", "emqx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 45s

  # ─────────────────────────────────────────────
  # UYGULAMA SERVİSLERİ
  # ─────────────────────────────────────────────

  fake-data-service:
    build:
      context: ../fake-data-service
      dockerfile: Dockerfile
    container_name: fake-data-service
    restart: unless-stopped
    networks:
      - kentsel
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ""
      REDIS_DB: "0"
      PUBLISH_RATE_PER_CHANNEL: "300"
    depends_on:
      redis:
        condition: service_healthy
      kafka-gatekeeper:
        condition: service_started

  kafka-gatekeeper:
    build:
      context: ../kafka-gatekeeper
      dockerfile: Dockerfile
    container_name: kafka-gatekeeper
    restart: unless-stopped
    networks:
      - kentsel
    environment:
      REDIS_URL: redis:6379
      REDIS_PASSWORD: ""
      KAFKA_BROKER: kafka:19092
      KAFKA_TOPIC_TRAFFIC: telemetry.traffic_lights
      KAFKA_TOPIC_DENSITY: telemetry.density
      KAFKA_TOPIC_SPEED: telemetry.speed_violations
      KAFKA_TOPIC_AIR: telemetry.air_quality
      BATCH_SIZE: "1000"
      BATCH_TIMEOUT_MS: "50"
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  ai-service:
    build:
      context: ../ai-service
      dockerfile: Dockerfile
    container_name: ai-service
    restart: unless-stopped
    ports:
      - "8000:8000"
    networks:
      - kentsel
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "8123"
      CLICKHOUSE_DB: telemetry
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      API_PORT: "8000"
    depends_on:
      clickhouse:
        condition: service_healthy

  dashboard-api:
    build:
      context: ../dashboard-api
      dockerfile: Dockerfile
    container_name: dashboard-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - kentsel
    environment:
      CLICKHOUSE_ADDR: clickhouse:9000
      CLICKHOUSE_DATABASE: telemetry
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      MQTT_BROKER: tcp://emqx:1883
      MQTT_CLIENT_ID: dashboard-api
      MQTT_TOPIC_PREFIX: telemetry
      SERVER_PORT: "8080"
      POLL_INTERVAL_MS: "50"
    depends_on:
      clickhouse:
        condition: service_healthy
      emqx:
        condition: service_healthy

  dashboard-ui:
    build:
      context: ../dashboard-ui
      dockerfile: Dockerfile
    container_name: dashboard-ui
    restart: unless-stopped
    ports:
      - "5173:80"
    networks:
      - kentsel
    depends_on:
      - dashboard-api
      - ai-service
